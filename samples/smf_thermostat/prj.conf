# State Machine Framework demo configuration.

# Core console output used by the demo.
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=n

# State Machine Framework.
CONFIG_SMF=y
# Hierarchical state machines: lets a state declare a parent.
CONFIG_SMF_ANCESTOR_SUPPORT=y
# Lets a parent state declare an initial child to descend into.
CONFIG_SMF_INITIAL_TRANSITION=y

# k_event object used to feed events to the state-machine thread.
CONFIG_EVENTS=y
